name: jewellery_erp
description: Jewellery ERP - Inventory, Billing, Tagging & Analytics

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^13.2.0

  # HTTP & API
  dio: ^5.4.3
  retrofit: ^4.1.0

  # Local storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Barcode / QR
  mobile_scanner: ^5.1.1
  qr_flutter: ^4.1.0

  # PDF & printing
  pdf: ^3.10.8
  printing: ^5.13.1

  # UI
  cupertino_icons: ^1.0.6
  fl_chart: ^0.68.0       # Charts for analytics
  intl: ^0.19.0
  image_picker: ^1.1.2
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  fluttertoast: ^8.2.5
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.3.9
  retrofit_generator: ^8.1.0
  json_annotation: ^4.9.0
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
